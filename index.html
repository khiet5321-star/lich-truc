<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Trực Chuyên Nghiệp</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h2 { color: #2c3e50; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        .table-container { width: 100%; max-width: 900px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background-color: #27ae60; color: white; padding: 15px; text-align: center; font-size: 14px; border: 1px solid #2ecc71; }
        td { padding: 12px; text-align: center; border: 1px solid #dfe6e9; font-size: 15px; color: #636e72; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f2f6; transition: 0.3s; }
        
        /* Chỉnh style cho ô checkbox */
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #27ae60; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .absent { background-color: #ff7675; color: white; }
        .present { background-color: #55efc4; color: #00b894; }
        
        #loading { margin-top: 20px; color: #7f8c8d; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Bảng Lịch Trực Công Tác</h2>
    <div class="table-container">
        <table id="lichTable" style="display:none;">
            <thead>
                <tr>
                    <th>Check</th>
                    <th>Ngày</th>
                    <th>Tên Nhân Viên</th>
                    <th>Người Giúp Đỡ</th>
                    <th>Trạng Thái</th>
                </tr>
            </thead>
            <tbody id="content"></tbody>
        </table>
        <div id="loading">🚀 Đang đồng bộ dữ liệu từ hệ thống...</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
