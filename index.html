<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điểm Danh Học Viên</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h2 { color: #2c3e50; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .table-container { width: 100%; max-width: 900px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background-color: #34495e; color: white; padding: 15px; text-align: center; border: 1px solid #2c3e50; }
        td { padding: 12px; text-align: center; border: 1px solid #ecf0f1; color: #2c3e50; font-size: 15px; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        /* Style cho Checkbox vắng */
        .checkbox-cell input { width: 20px; height: 20px; cursor: not-allowed; accent-color: #e74c3c; }
        .absent-row { background-color: #fff5f5 !important; color: #c0392b !important; }
        .name-cell { font-weight: bold; color: #2980b9; }
        #loading { margin-top: 20px; color: #95a5a6; font-weight: 500; }
    </style>
</head>
<body>
    <h2>DANH SÁCH ĐIỂM DANH TRỰC</h2>
    <div class="table-container">
        <table id="lichTable" style="display:none;">
            <thead>
                <tr>
                    <th>Tên</th>
                    <th>Ngày</th>
                    <th>Vắng</th>
                    <th>Giúp đỡ</th>
                </tr>
            </thead>
            <tbody id="content"></tbody>
        </table>
        <div id="loading">⏳ Đang tải dữ liệu, chờ chút nhé...</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
